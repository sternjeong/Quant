name: Nightly Strategy Tuning

# 매일 15:05 UTC(=00:05 KST, 다음날) 자동 실행 + 수동 실행(workflow_dispatch) 지원.
# scripts/nightly_tuning_ci.py 가 core.strategy_tuning.run_and_save_tuning()을 예산(분) 동안
# 반복하고, 결과를 data/nightly_tuning_leaderboard.json으로 내보낸다 — 이 잡이 그 파일을
# 저장소에 커밋/푸시해 다음 실행과 Streamlit Community Cloud 배포본이 이어서 읽을 수 있게 한다.

on:
  schedule:
    - cron: "5 15 * * *"
  workflow_dispatch:
    inputs:
      budget_minutes:
        description: "이번 실행에서 튜닝에 쓸 최대 시간(분)"
        required: false
        default: "270"

permissions:
  contents: write

concurrency:
  group: nightly-tuning
  cancel-in-progress: false

jobs:
  nightly-tuning:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly tuning
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NIGHTLY_TUNING_BUDGET_MINUTES: ${{ github.event.inputs.budget_minutes || '270' }}
        run: python scripts/nightly_tuning_ci.py

      # scripts/nightly_tuning_ci.py가 이제 반복마다 직접 커밋+푸시한다(2026-07-21, SPEC 16절 —
      # 잡이 하드 타임아웃으로 중간에 죽어도 그 직전 반복까지는 이미 원격에 안전하게 남도록). 이
      # 스텝은 혹시 스크립트 실행 중 커밋되지 못하고 남은 변경분이 있을 때만 잡아내는 폴백이라
      # 대부분의 실행에서는 커밋할 게 없어 조용히 스킵된다.
      - name: Commit any remaining leaderboard + macro cache changes (fallback)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nightly_tuning_leaderboard.json data/cache/fred_*.csv
          git diff --cached --quiet || git commit -m "chore: nightly tuning leaderboard + macro cache update (fallback)"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
